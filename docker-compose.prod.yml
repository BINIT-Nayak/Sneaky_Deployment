services:
  caddy:
    image: caddy:2.11-alpine
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in .env, for example sneaky.example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

  frontend:
    build:
      context: ../Sneaky
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ../Sneaky_Backend
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Sneaky
      SPRING_DATASOURCE_USERNAME: sneaky
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_FORMAT_SQL: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env. Generate one with: openssl rand -base64 32}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ""
      APP_CORS_ALLOWED_ORIGINS: https://${DOMAIN:?Set DOMAIN in .env}
      APP_AUTH_REFRESH_COOKIE_SECURE: "true"
      APP_AUTH_REFRESH_COOKIE_SAME_SITE: Lax
      APP_SEED_PRODUCTS_ENABLED: ${APP_SEED_PRODUCTS_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: Sneaky
      POSTGRES_USER: sneaky
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - sneaky_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sneaky -d Sneaky"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - sneaky_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  sneaky_postgres_data:
  sneaky_redis_data:
