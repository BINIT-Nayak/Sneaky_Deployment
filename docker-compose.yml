services:
  frontend:
    build:
      context: ../Sneaky
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ../Sneaky_Backend
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/Sneaky
      SPRING_DATASOURCE_USERNAME: sneaky
      SPRING_DATASOURCE_PASSWORD: sneaky_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_FORMAT_SQL: "false"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env. Generate one with: openssl rand -base64 32}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ""
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      APP_AUTH_REFRESH_COOKIE_SECURE: "false"
      APP_AUTH_REFRESH_COOKIE_SAME_SITE: Lax
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: Sneaky
      POSTGRES_USER: sneaky
      POSTGRES_PASSWORD: sneaky_password
    ports:
      - "5432:5432"
    volumes:
      - sneaky_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sneaky -d Sneaky"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - sneaky_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  sneaky_postgres_data:
  sneaky_redis_data:
